# create a APK (debug) and publish as artefact.
name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      # `packages` must be space-separated on ONE line (multiline YAML is passed as a single invalid name).
      - name: Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-36 build-tools;35.0.1

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simpleplayer-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
